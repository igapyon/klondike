<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Klondike Solitaire - Production Ready</title>
    <script src="https://cardmeister.github.io/elements.cardmeister.min.js"></script>
    <style>
      :root {
        --card-w: 100px; --card-h: 140px;
        --bg: #0c3b2e; --felt: #0f4a39; --accent: #f7c96b; --ink: #f5f2ea;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; font-family: sans-serif; color: var(--ink);
        background: radial-gradient(1200px 600px at 20% 0%, #1a6b51 0%, var(--bg) 45%, #072a20 100%);
        min-height: 100vh; overflow-x: hidden;
      }
      header { padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; }
      button { background: var(--accent); border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
      .board { padding: 0 24px 40px; display: grid; gap: 30px; max-width: 900px; margin: 0 auto; }
      .top-row, .bottom-row { display: grid; grid-template-columns: repeat(7, var(--card-w)); gap: 12px; }
      .slot, .column {
        position: relative; width: var(--card-w); min-height: var(--card-h);
        border-radius: 8px; background: rgba(0, 0, 0, 0.2); box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
      }
      .slot.empty::after {
        content: ""; position: absolute; inset: 10px; border: 2px dashed rgba(255, 255, 255, 0.1); border-radius: 6px;
      }
      playing-card {
        position: absolute; width: var(--card-w); height: var(--card-h);
        cursor: pointer; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4)); user-select: none;
      }
      .stock-count { position: absolute; bottom: -24px; width: 100%; text-align: center; font-size: 13px; opacity: 0.8; }
    </style>
  </head>
  <body>
    <header><h1>Klondike</h1><div class="controls"><button id="new-game">New Game</button></div></header>
    <main class="board">
      <section class="top-row">
        <div id="stock" class="slot empty"></div>
        <div id="waste" class="slot"></div>
        <div class="spacer"></div>
        <div id="foundation-0" class="slot empty"></div>
        <div id="foundation-1" class="slot empty"></div>
        <div id="foundation-2" class="slot empty"></div>
        <div id="foundation-3" class="slot empty"></div>
      </section>
      <section class="bottom-row">
        <div id="tableau-0" class="column"></div>
        <div id="tableau-1" class="column"></div>
        <div id="tableau-2" class="column"></div>
        <div id="tableau-3" class="column"></div>
        <div id="tableau-4" class="column"></div>
        <div id="tableau-5" class="column"></div>
        <div id="tableau-6" class="column"></div>
      </section>
    </main>

    <script>
      const SUITS = ["Spades", "Hearts", "Diamonds", "Clubs"];
      const RANKS = ["Ace", "2", "3", "4", "5", "6", "7", "8", "9", "10", "Jack", "Queen", "King"];
      
      let state = null;

      function createCard(s, r) {
        return { suit: s, rank: r + 1, color: (s === 0 || s === 3) ? 0 : 1, isOpen: false };
      }

      function initState() {
        const d = [];
        for (let s = 0; s < 4; s++) for (let r = 0; r < 13; r++) d.push(createCard(s, r));
        for (let i = d.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [d[i], d[j]] = [d[j], d[i]];
        }
        const t = Array.from({ length: 7 }, () => []);
        const f = Array.from({ length: 4 }, () => []);
        for (let i = 0; i < 7; i++) {
          for (let j = 0; j <= i; j++) {
            const card = d.pop(); card.isOpen = (j === i);
            t[i].push(card);
          }
        }
        return { stock: d, waste: [], foundations: f, tableau: t };
      }

      // エラーを絶対に出さない CID 生成
      function getCid(card) {
        if (!card || !card.isOpen) return "back"; // ライブラリが唯一安全に処理できる裏面名
        return `${RANKS[card.rank - 1]}-of-${SUITS[card.suit]}`;
      }

      function canPlaceOnFoundation(card, found) {
        if (!card) return false;
        if (found.length === 0) return card.rank === 1;
        const top = found[found.length - 1];
        return card.suit === top.suit && card.rank === top.rank + 1;
      }

      function canPlaceOnTableau(card, dest) {
        if (!card) return false;
        if (dest.length === 0) return card.rank === 13;
        const top = dest[dest.length - 1];
        return top.isOpen && card.rank === top.rank - 1 && card.color !== top.color;
      }

      function render() {
        if (!state) return;
        const clear = (el) => { while(el.firstChild) el.removeChild(el.firstChild); };

        // 山札
        const sEl = document.getElementById("stock"); clear(sEl);
        if (state.stock.length > 0) {
          const c = document.createElement("playing-card");
          c.setAttribute("cid", "back");
          sEl.appendChild(c);
          const cnt = document.createElement("div"); cnt.className = "stock-count"; cnt.textContent = `残り ${state.stock.length}枚`;
          sEl.appendChild(cnt);
        }
        sEl.onclick = () => {
          if (state.stock.length === 0) {
            state.stock = state.waste.reverse(); state.stock.forEach(c => c.isOpen = false);
            state.waste = [];
          } else {
            const count = Math.min(3, state.stock.length);
            for (let i = 0; i < count; i++) {
              const c = state.stock.pop(); c.isOpen = true; state.waste.push(c);
            }
          }
          render();
        };

        // 捨札
        const wEl = document.getElementById("waste"); clear(wEl);
        if (state.waste.length > 0) {
          const c = state.waste[state.waste.length - 1];
          const el = document.createElement("playing-card");
          el.setAttribute("cid", getCid(c));
          el.onclick = (e) => {
            e.stopPropagation();
            if (canPlaceOnFoundation(c, state.foundations[c.suit])) {
              state.foundations[c.suit].push(state.waste.pop()); render(); return;
            }
            for (let i = 0; i < 7; i++) {
              if (canPlaceOnTableau(c, state.tableau[i])) {
                state.tableau[i].push(state.waste.pop()); render(); return;
              }
            }
          };
          wEl.appendChild(el);
        }

        // 組札
        state.foundations.forEach((stack, i) => {
          const el = document.getElementById(`foundation-${i}`); clear(el);
          if (stack.length > 0) {
            const cEl = document.createElement("playing-card");
            cEl.setAttribute("cid", getCid(stack[stack.length - 1]));
            el.appendChild(cEl);
          }
        });

        // 場札
        state.tableau.forEach((col, colIdx) => {
          const colEl = document.getElementById(`tableau-${colIdx}`); clear(colEl);
          col.forEach((card, rowIdx) => {
            const el = document.createElement("playing-card");
            el.setAttribute("cid", getCid(card));
            el.style.top = `${rowIdx * 28}px`;
            if (card.isOpen) {
              el.onclick = (e) => {
                e.stopPropagation();
                if (rowIdx === col.length - 1 && canPlaceOnFoundation(card, state.foundations[card.suit])) {
                  state.foundations[card.suit].push(col.pop());
                  if (col.length > 0) col[col.length-1].isOpen = true;
                  render(); return;
                }
                const run = col.slice(rowIdx);
                for (let i = 0; i < 7; i++) {
                  if (i !== colIdx && canPlaceOnTableau(run[0], state.tableau[i])) {
                    state.tableau[i] = state.tableau[i].concat(run);
                    state.tableau[colIdx] = col.slice(0, rowIdx);
                    if (state.tableau[colIdx].length > 0) state.tableau[colIdx][state.tableau[colIdx].length-1].isOpen = true;
                    render(); return;
                  }
                }
              };
            }
            colEl.appendChild(el);
          });
        });
      }

      // ライブラリの準備が確実に整ってから起動
      window.addEventListener('load', () => {
        customElements.whenDefined('playing-card').then(() => {
          state = initState();
          render();
          document.getElementById("new-game").onclick = () => { state = initState(); render(); };
        });
      });
    </script>
  </body>
</html>
