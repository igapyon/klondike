<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Klondike (Solitaire)</title>
    <script src="https://cardmeister.github.io/elements.cardmeister.min.js"></script>
    <style>
      :root {
        --card-w: 100px; --card-h: 140px;
        --bg: #008000;
        --accent: #ffffff;
        --ink: #f5f2ea;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; color: var(--ink);
        background: var(--bg);
        min-height: 100vh; overflow: hidden; 
        user-select: none; -webkit-user-select: none;
        touch-action: manipulation;
      }
      header { padding: 15px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
      h1 { margin: 0; font-size: 18px; color: var(--accent); font-weight: normal; text-shadow: 1px 1px 2px black; }
      .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
      
      .toggle-label { display: flex; align-items: center; cursor: pointer; color: white; font-size: 12px; gap: 5px; background: rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 4px; }
      .toggle-label input { cursor: pointer; }

      button { background: #ece9d8; color: black; border: 1px solid #003c74; padding: 6px 12px; border-radius: 3px; font-size: 12px; cursor: pointer; white-space: nowrap; }
      button:hover { box-shadow: 0 0 0 1px #f5f2ea inset; }
      button:active { transform: translateY(1px); }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      
      #status-msg { color: #ffff00; font-weight: bold; font-size: 14px; margin-right: 10px; text-shadow: 1px 1px 0 #000; min-width: 80px; text-align: right; }
      
      .board { padding: 10px 24px 40px; display: grid; gap: 40px; max-width: 900px; margin: 0 auto; transition: gap 0.3s; }
      .top-row, .bottom-row { display: grid; grid-template-columns: repeat(7, var(--card-w)); gap: 15px; justify-content: center; transition: gap 0.3s; }

      @media (max-width: 800px) {
        :root { --card-w: 13vw; --card-h: 18.2vw; }
        .board { padding: 10px 10px; gap: 20px; }
        .top-row, .bottom-row { gap: 8px; }
      }

      .slot, .column {
        position: relative; width: var(--card-w); min-height: var(--card-h);
        border-radius: 4px; 
        border: 2px solid rgba(255,255,255,0.2);
        cursor: pointer; 
        transition: height 0.2s;
      }
      .slot:empty, .column:empty { border: 2px solid rgba(0,0,0,0.1); background: rgba(0,0,0,0.05); }

      playing-card { position: absolute; width: var(--card-w); height: var(--card-h); cursor: pointer; filter: drop-shadow(1px 1px 3px rgba(0,0,0,0.6)); transition: top 0.1s; pointer-events: auto; }
      .stock-count { display:none; }
      
      #win-overlay {
        display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
        z-index: 100; flex-direction: column; align-items: center; justify-content: center;
        color: white; animation: fadeIn 0.5s forwards;
      }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .win-msg { font-size: 40px; margin-bottom: 20px; font-family: "Times New Roman", serif; }
      
      #stuck-warning {
        position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
        background: rgba(255, 0, 0, 0.85); color: white; padding: 10px 20px;
        border-radius: 20px; font-weight: bold; pointer-events: none;
        opacity: 0; transition: opacity 0.3s; z-index: 50;
        box-shadow: 0 4px 10px rgba(0,0,0,0.5); font-size: 14px;
        white-space: nowrap;
      }
    </style>
  </head>
  <body oncontextmenu="return false;">
    <div id="win-overlay">
        <div class="win-msg">Congratulations</div>
        <button onclick="location.reload()">Deal Again</button>
    </div>
    
    <div id="stuck-warning">⚠️ Likely Stuck (Undo Recommended)</div>

    <header>
      <h1>Klondike (Solitaire)</h1>
      <div class="controls">
        <span id="status-msg"></span>
        <label class="toggle-label" title="自動判定＋デバッグログ出力">
            <input type="checkbox" id="chk-autocheck"> Solvability Check
        </label>
        <button id="btn-undo" disabled>Undo</button>
        <button id="btn-restart" disabled>Restart</button>
        <button id="new-game">New Game</button>
      </div>
    </header>
    <main class="board">
      <section class="top-row">
        <div id="stock" class="slot"></div><div id="waste" class="slot"></div>
        <div class="spacer"></div>
        <div id="foundation-0" class="slot"></div><div id="foundation-1" class="slot"></div>
        <div id="foundation-2" class="slot"></div><div id="foundation-3" class="slot"></div>
      </section>
      <section class="bottom-row">
        <div id="tableau-0" class="column"></div><div id="tableau-1" class="column"></div>
        <div id="tableau-2" class="column"></div><div id="tableau-3" class="column"></div>
        <div id="tableau-4" class="column"></div><div id="tableau-5" class="column"></div>
        <div id="tableau-6" class="column"></div>
      </section>
    </main>

    <script>
      /* --- [Core] Configuration --- */
      // 【変更点1】 並び順を スペード(0), ハート(1), クラブ(2), ダイヤ(3) に変更
      const SUITS = ["spades", "hearts", "clubs", "diamonds"];
      const RANKS = ["ace", "2", "3", "4", "5", "6", "7", "8", "9", "ten", "jack", "queen", "king"];
      
      let state = null;
      let initialState = null; 
      let historyStack = [];
      let isAutoFinishing = false; 

      /* --- [Simulator] --- */
      class Simulator {
        constructor() {}
        clone(s) { return JSON.parse(JSON.stringify(s)); }
        
        findSolvableDeck() {
            let attempts = 0;
            while (attempts < 500) {
                const deck = this.createDeck();
                const startState = this.deal(deck);
                if (this.canSolve(this.clone(startState))) return startState;
                attempts++;
            }
            return this.deal(this.createDeck());
        }

        checkCurrentState(currentState) {
            for(let i=0; i<5; i++) {
                if (this.canSolve(this.clone(currentState))) return true;
            }
            return false;
        }

        createDeck() {
            const d = [];
            // 【変更点2】 色の判定ロジックを変更。偶数(0,2)が黒、奇数(1,3)が赤
            for (let s = 0; s < 4; s++) for (let r = 0; r < 13; r++) d.push({ suit: s, rank: r + 1, color: (s % 2 === 0) ? 0 : 1, isOpen: false });
            for (let i = d.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [d[i], d[j]] = [d[j], d[i]]; }
            return d;
        }
        deal(d) {
             let t = Array.from({ length: 7 }, () => []);
             const tempDeck = [...d];
             for (let i = 0; i < 7; i++) {
                 for (let j = 0; j <= i; j++) {
                     const c = tempDeck.pop(); c.isOpen = (j === i); t[i].push(c);
                 }
             }
             return { stock: tempDeck, waste: [], foundations: [[],[],[],[]], tableau: t };
        }

        canSolve(simState) {
            let moves = 0;
            let noProgressLoop = 0;
            const LIMIT = 1000;
            while (moves < LIMIT && noProgressLoop < 50) {
                let moved = false;
                for (let i = 0; i < 7; i++) {
                    const col = simState.tableau[i];
                    if (col.length > 0) {
                        const c = col[col.length - 1];
                        if (this.checkF(simState, c, c.suit)) {
                            simState.foundations[c.suit].push(col.pop());
                            if (col.length > 0) col[col.length - 1].isOpen = true;
                            moved = true; break;
                        }
                    }
                }
                if (moved) { moves++; noProgressLoop=0; continue; }
                if (simState.waste.length > 0) {
                    const c = simState.waste[simState.waste.length - 1];
                    if (this.checkF(simState, c, c.suit)) {
                        simState.foundations[c.suit].push(simState.waste.pop());
                        moved = true;
                    }
                }
                if (moved) { moves++; noProgressLoop=0; continue; }
                for (let i = 0; i < 7; i++) {
                    const col = simState.tableau[i];
                    if (col.length === 0) continue;
                    let openIdx = -1;
                    for(let k=0; k<col.length; k++) { if(col[k].isOpen) { openIdx=k; break; } }
                    if (openIdx === -1) continue; 
                    if (openIdx === 0 && col[openIdx].rank === 13) continue;
                    const cardToMove = col[openIdx];
                    const target = this.findTabTarget(simState, cardToMove, i);
                    if (target !== -1) {
                        const run = col.splice(openIdx);
                        simState.tableau[target] = simState.tableau[target].concat(run);
                        if (col.length > 0) col[col.length - 1].isOpen = true;
                        moved = true; break;
                    }
                }
                if (moved) { moves++; noProgressLoop=0; continue; }
                if (simState.waste.length > 0) {
                    const c = simState.waste[simState.waste.length - 1];
                    const target = this.findTabTarget(simState, c, -1);
                    if (target !== -1) {
                        simState.tableau[target].push(simState.waste.pop());
                        moved = true;
                    }
                }
                if (moved) { moves++; noProgressLoop=0; continue; }
                if (simState.stock.length > 0) {
                    const c = simState.stock.pop(); c.isOpen = true;
                    simState.waste.push(c); moved = true;
                } else if (simState.stock.length === 0 && simState.waste.length > 0) {
                    simState.stock = simState.waste.reverse();
                    simState.stock.forEach(x => x.isOpen = false);
                    simState.waste = []; moved = true;
                }
                if (moved) {
                     moves++; 
                     if (simState.stock.length === 0 && simState.waste.length === 0) noProgressLoop = 0;
                     else noProgressLoop++;
                } else break;
            }
            return simState.foundations.reduce((a, b) => a + b.length, 0) === 52;
        }
        checkF(s, card, fIdx) {
            const f = s.foundations[fIdx];
            if (f.length === 0) return card.rank === 1 && card.suit === fIdx;
            const top = f[f.length - 1];
            return card.suit === top.suit && card.rank === top.rank + 1;
        }
        findTabTarget(s, card, ignoreIdx) {
            for (let i = 0; i < 7; i++) {
                if (i === ignoreIdx) continue;
                const dest = s.tableau[i];
                if (dest.length === 0) { if (card.rank === 13) return i; } 
                else {
                    const top = dest[dest.length - 1];
                    if (card.rank === top.rank - 1 && card.color !== top.color) return i;
                }
            }
            return -1;
        }
      }
      const bot = new Simulator();

      /* --- [Helper Functions] --- */
      function isSafeToAutoMove(card) {
        if (card.rank === 1) return true; 
        const targetRank = card.rank - 1;
        const otherColor = 1 - card.color;
        let count = 0;
        state.foundations.forEach((f, idx) => {
            // 【変更点3】 色判定ロジックの修正 (0=S黒, 1=H赤, 2=C黒, 3=D赤)
            const fColor = (idx % 2 === 0) ? 0 : 1;
            if (fColor === otherColor) {
                const top = f[f.length - 1];
                if (top && top.rank >= targetRank) count++;
            }
        });
        return count === 2; 
      }
      function getCid(card) {
        if (!card || !card.isOpen) return "back"; 
        return `${RANKS[card.rank - 1]}-of-${SUITS[card.suit]}`;
      }
      
      function pushHistory() {
        if (state) {
            if (historyStack.length > 1000) historyStack.shift(); 
            historyStack.push(JSON.stringify(state));
            updateButtons();
        }
      }
      
      function popHistory() {
        if (historyStack.length === 0) return;
        state = JSON.parse(historyStack.pop());
        render(); updateButtons(); performAutoCheck();
      }
      
      function updateButtons() { 
        document.getElementById("btn-undo").disabled = (historyStack.length === 0);
        document.getElementById("btn-restart").disabled = (initialState === null);
      }
      function showStatus(msg, color="#ffff00") {
        const el = document.getElementById("status-msg");
        el.textContent = msg; el.style.color = color;
      }
      function clearStatus() { document.getElementById("status-msg").textContent = ""; hideWarning(); }
      function showWarning() { document.getElementById("stuck-warning").style.opacity = "1"; }
      function hideWarning() { document.getElementById("stuck-warning").style.opacity = "0"; }
      
      function checkFoundationMove(card, fIdx) {
        const found = state.foundations[fIdx];
        if (found.length === 0) return { ok: (card.rank === 1 && card.suit === fIdx) };
        const top = found[found.length - 1];
        return { ok: (card.suit === top.suit && card.rank === top.rank + 1) };
      }
      function canPlaceOnTableau(card, tIdx) {
        const dest = state.tableau[tIdx];
        if (dest.length === 0) return { ok: (card.rank === 13), type: "Kのみ" };
        const top = dest[dest.length - 1];
        const match = top.isOpen && (card.rank === top.rank - 1) && (card.color !== top.color);
        return match ? { ok: true, type: "連番" } : { ok: false };
      }

      async function performAutoCheck() {
        const isCheckEnabled = document.getElementById("chk-autocheck").checked;
        if (!isCheckEnabled || isAutoFinishing || !state) { clearStatus(); return; }
        
        showStatus("Chk...", "#ccc");
        await new Promise(r => setTimeout(r, 20));
        
        const isWinnable = bot.checkCurrentState(state);
        
        // --- Full Debug Log (Restored) ---
        console.clear();
        console.group("%c[DEBUG] Game Status", "color: orange; font-weight: bold; font-size: 12px;");
        console.log(`%cWinnable: ${isWinnable ? "YES" : "NO"}`, isWinnable ? "color: green; font-weight:bold" : "color: red; font-weight:bold");
        console.log("Stock:", JSON.parse(JSON.stringify(state.stock)));
        console.log("Waste:", JSON.parse(JSON.stringify(state.waste)));
        console.log("Tableau:", JSON.parse(JSON.stringify(state.tableau)));
        console.log("Foundations:", JSON.parse(JSON.stringify(state.foundations)));
        console.groupEnd();
        // --------------------------------

        if (isWinnable) { showStatus("OK", "#00ff00"); hideWarning(); }
        else { showStatus("STUCK?", "#ff5555"); showWarning(); }
      }

      async function startNewGame() {
        showStatus("Gen...");
        const btnNew = document.getElementById("new-game");
        btnNew.disabled = true;
        await new Promise(r => setTimeout(r, 50)); 
        const newState = bot.findSolvableDeck();
        state = newState;
        initialState = JSON.parse(JSON.stringify(newState));
        historyStack = []; 
        isAutoFinishing = false;
        clearStatus();
        btnNew.disabled = false;
        render(); updateButtons(); performAutoCheck(); // Init Check
      }

      function restartGame() {
        if (!initialState) return;
        if(confirm("最初からやり直しますか？")) {
            state = JSON.parse(JSON.stringify(initialState));
            historyStack = [];
            isAutoFinishing = false;
            clearStatus();
            render(); updateButtons(); performAutoCheck();
        }
      }

      function triggerAutoFoundation(immediate = false) {
        if (isAutoFinishing) return;
        const scanAndMove = () => {
          let moved = false;
          for (let i = 0; i < 7; i++) {
            const col = state.tableau[i];
            if (col.length > 0) {
              const card = col[col.length - 1];
              if (checkFoundationMove(card, card.suit).ok && isSafeToAutoMove(card)) {
                state.foundations[card.suit].push(col.pop());
                if (col.length > 0) col[col.length - 1].isOpen = true;
                moved = true; break; 
              }
            }
          }
          if (!moved && state.waste.length > 0) {
            const card = state.waste[state.waste.length - 1];
            if (checkFoundationMove(card, card.suit).ok && isSafeToAutoMove(card)) {
              state.foundations[card.suit].push(state.waste.pop());
              moved = true;
            }
          }
          if (moved) { 
              render(); 
              setTimeout(triggerAutoFoundation, 100, true); 
          } else {
              checkVictoryCondition();
              performAutoCheck();
          }
        };
        if (immediate) scanAndMove();
        else setTimeout(scanAndMove, 800);
      }

      // --- [Event Delegation Click Handler] ---
      function handleSlotClick(type, idx, mode = "single", specificCardIdx = -1) {
        if (isAutoFinishing) return;
        clearStatus();
        let sourceArray, cardIdx;
        
        if (type === 'waste') {
            if (state.waste.length === 0) return;
            sourceArray = state.waste; 
            cardIdx = sourceArray.length - 1; 
        } else {
            sourceArray = state.tableau[idx]; 
            if (sourceArray.length === 0 && specificCardIdx === -1) return;
            if (specificCardIdx !== -1) cardIdx = specificCardIdx;
            else cardIdx = sourceArray.length - 1;
            if (!sourceArray[cardIdx].isOpen) return;
        }

        const card = sourceArray[cardIdx];
        const run = sourceArray.slice(cardIdx);
        const isSingleCard = run.length === 1;
        let moveSuccess = false;

        // 1. Double Click -> Foundation
        if (mode !== "single" && isSingleCard) {
            if (checkFoundationMove(card, card.suit).ok) {
                pushHistory();
                state.foundations[card.suit].push(sourceArray.pop());
                if (type === 'tableau' && sourceArray.length > 0) sourceArray[sourceArray.length-1].isOpen = true;
                moveSuccess = true;
            }
        }
        
        // 2. Single Click -> Tableau Move
        if (!moveSuccess) {
            let bestTarget = -1;
            for (let i = 0; i < 7; i++) {
                if (type === 'tableau' && i === idx) continue;
                const resT = canPlaceOnTableau(run[0], i);
                if (resT.ok && resT.type === "連番") { bestTarget = i; break; }
            }
            if (bestTarget === -1) {
                for (let i = 0; i < 7; i++) {
                    if (type === 'tableau' && i === idx) continue;
                    const resT = canPlaceOnTableau(run[0], i);
                    if (resT.ok && resT.type === "Kのみ") { bestTarget = i; break; }
                }
            }
            if (bestTarget !== -1) {
                pushHistory();
                state.tableau[bestTarget] = state.tableau[bestTarget].concat(run);
                if (type === 'waste') state.waste.pop();
                else {
                    state.tableau[idx] = sourceArray.slice(0, cardIdx);
                    if (state.tableau[idx].length > 0) state.tableau[idx][state.tableau[idx].length - 1].isOpen = true;
                }
                moveSuccess = true;
            }
        }

        // 3. Foundation Fallback
        if (!moveSuccess && isSingleCard) {
             if (checkFoundationMove(card, card.suit).ok) {
                pushHistory();
                state.foundations[card.suit].push(sourceArray.pop());
                if (type === 'tableau' && sourceArray.length > 0) sourceArray[sourceArray.length-1].isOpen = true;
                moveSuccess = true;
            }
        }

        if (moveSuccess) { render(); triggerAutoFoundation(); }
      }

      function checkVictoryCondition() {
        const total = state.foundations.reduce((acc, f) => acc + f.length, 0);
        if (total === 52) { 
            document.getElementById("win-overlay").style.display = "flex"; 
            return; 
        }
        const stockEmpty = state.stock.length === 0 && state.waste.length === 0;
        const allTableauOpen = state.tableau.every(col => col.every(c => c.isOpen));
        if (stockEmpty && allTableauOpen && !isAutoFinishing) {
            isAutoFinishing = true; setTimeout(autoDissolve, 50);
        }
      }

      function autoDissolve() {
        let moved = false;
        for (let i = 0; i < 7; i++) {
            const col = state.tableau[i];
            if (col.length > 0) {
                const c = col[col.length - 1];
                if (checkFoundationMove(c, c.suit).ok) {
                    state.foundations[c.suit].push(col.pop());
                    moved = true; break;
                }
            }
        }
        if (moved) { render(); setTimeout(autoDissolve, 50); }
        else { checkVictoryCondition(); }
      }

      function render() {
        if (!state) return;
        document.querySelectorAll('.slot, .column').forEach(el => {
            el.innerHTML = "";
            const newEl = el.cloneNode(true);
            el.parentNode.replaceChild(newEl, el);
        });
        
        const sEl = document.getElementById("stock");
        if (state.stock.length > 0) { sEl.innerHTML = `<playing-card cid="back"></playing-card>`; }
        sEl.onclick = () => {
          if (isAutoFinishing) return;
          clearStatus();
          pushHistory();
          if (state.stock.length === 0) {
            state.stock = state.waste.reverse(); state.stock.forEach(c => c.isOpen = false); state.waste = [];
          } else {
            const c = state.stock.pop(); c.isOpen = true; state.waste.push(c);
          }
          render(); triggerAutoFoundation(); performAutoCheck();
        };

        const wEl = document.getElementById("waste");
        if (state.waste.length > 0) wEl.innerHTML = `<playing-card cid="${getCid(state.waste[state.waste.length-1])}"></playing-card>`;
        wEl.onclick = () => handleSlotClick('waste', -1, "single");
        wEl.ondblclick = () => handleSlotClick('waste', -1, "double");
        wEl.oncontextmenu = (e) => { e.preventDefault(); handleSlotClick('waste', -1, "right"); };

        state.foundations.forEach((stack, i) => {
          const el = document.getElementById(`foundation-${i}`);
          if (stack.length > 0) el.innerHTML = `<playing-card cid="${getCid(stack[stack.length-1])}"></playing-card>`;
        });

        state.tableau.forEach((col, colIdx) => {
          const colEl = document.getElementById(`tableau-${colIdx}`);
          
          const overlap = col.length > 15 ? 15 : 20; 
          const stackHeight = 140 + (col.length > 0 ? (col.length - 1) * overlap : 0);
          colEl.style.height = `${stackHeight}px`;

          col.forEach((card, rowIdx) => {
            const el = document.createElement("playing-card");
            el.setAttribute("cid", getCid(card));
            el.style.top = `${rowIdx * overlap}px`; 
            el.dataset.idx = rowIdx;
            colEl.appendChild(el);
          });
          
          colEl.onclick = (e) => {
              const cardEl = e.target.closest('playing-card');
              if (cardEl) handleSlotClick('tableau', colIdx, "single", parseInt(cardEl.dataset.idx));
              else handleSlotClick('tableau', colIdx, "single", -1);
          };
          colEl.ondblclick = (e) => {
              const cardEl = e.target.closest('playing-card');
              if (cardEl) handleSlotClick('tableau', colIdx, "double", parseInt(cardEl.dataset.idx));
          };
        });
      }
      
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); popHistory(); }
        if (e.key === 'F2') { e.preventDefault(); startNewGame(); }
      });
      document.getElementById("btn-undo").onclick = popHistory;
      document.getElementById("btn-restart").onclick = restartGame;
      document.getElementById("new-game").onclick = startNewGame;
      document.getElementById("chk-autocheck").onchange = () => { performAutoCheck(); };

      window.addEventListener('load', () => {
        customElements.whenDefined('playing-card').then(() => {
          setTimeout(startNewGame, 300);
        });
      });
    </script>
  </body>
</html>
